name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

env:
  MODEL_URL: https://github.com/thedavidweng/openkara-models/releases/download/model-v1/htdemucs.onnx
  # TODO: Update SHA-256 after first openkara-models release (push model-v1 tag).
  MODEL_SHA256: PLACEHOLDER_UPDATE_AFTER_MODEL_RELEASE

jobs:
  verify:
    name: Verify (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
          - name: Windows
            os: windows-latest
          - name: Linux
            os: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            patchelf \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Download separation model (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: ./scripts/setup.sh

      - name: Download separation model (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $modelPath = Join-Path $env:GITHUB_WORKSPACE "src-tauri/models/htdemucs.onnx"
          $modelDir = Split-Path $modelPath
          New-Item -ItemType Directory -Force -Path $modelDir | Out-Null

          function Get-ModelSha256([string]$path) {
            return (Get-FileHash -Algorithm SHA256 $path).Hash.ToLowerInvariant()
          }

          if (Test-Path $modelPath) {
            if ((Get-ModelSha256 $modelPath) -eq $env:MODEL_SHA256) {
              Write-Host "Model already present and verified at $modelPath"
              exit 0
            }

            Remove-Item $modelPath -Force
          }

          $tmpPath = "$modelPath.download"
          Invoke-WebRequest -Uri $env:MODEL_URL -OutFile $tmpPath
          $downloadedSha = Get-ModelSha256 $tmpPath

          if ($downloadedSha -ne $env:MODEL_SHA256) {
            Remove-Item $tmpPath -Force -ErrorAction SilentlyContinue
            throw "Downloaded model checksum mismatch. Expected $env:MODEL_SHA256 got $downloadedSha"
          }

          Move-Item -Force $tmpPath $modelPath

      - name: Lint frontend
        run: pnpm lint

      - name: Verify formatting
        run: pnpm format

      - name: Run Rust tests
        working-directory: src-tauri
        run: cargo test

      - name: Validate Tauri build
        run: pnpm tauri build --debug --no-bundle --ci
